name: Build All Flavors

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the release with (e.g. 1.0.0)"
        required: true
        type: string
      publish:
        description: "Publish a GitHub Release (otherwise assets are only staged as a dry run)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.flavor }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: linux-x64
            os: ubuntu-latest
            script: ./build_linux-x64.sh
          - flavor: linux-arm64
            os: ubuntu-latest
            script: ./build_linux-arm64.sh
          - flavor: osx-x64
            os: macos-latest
            script: ./build_osx-x64.sh
          - flavor: osx-arm64
            os: macos-latest
            script: ./build_osx-arm64.sh
          - flavor: win-x64
            os: windows-latest
            script: build_win-x64.bat
          - flavor: win-arm64
            os: windows-latest
            script: build_win-arm64.bat
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: src/global.json

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "${{ matrix.script }}"
          "${{ matrix.script }}" "${{ inputs.version }}"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: ${{ matrix.script }} "${{ inputs.version }}"
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: OSFRLauncher-${{ inputs.version }}-${{ matrix.flavor }}
          path: releases/
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p staging

          for dir in artifacts/*/; do
            channel=""
            for manifest in "$dir"releases.*.json; do
              channel="$(basename "$manifest" .json)"
              channel="${channel#releases.}"
            done

            if [ -z "$channel" ]; then
              echo "::error::No releases.*.json manifest found in $dir"
              exit 1
            fi

            for file in "$dir"*; do
              [ -f "$file" ] || continue
              name="$(basename "$file")"

              if [[ "$name" == *"$channel"* ]]; then
                # already includes channel in name
                cp "$file" "staging/$name"
              elif [[ "$name" == *.* ]]; then
                # add channel before extension to disambiguate (e.g. OSFRLauncher.AppImage)
                cp "$file" "staging/${name%.*}-${channel}.${name##*.}"
              else
                # add channel at the end of the name to disambiguate (e.g. RELEASES)
                cp "$file" "staging/${name}-${channel}"
              fi
            done
          done

          echo "Staged release assets:"
          ls -1 staging

      - name: Publish GitHub Release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ inputs.version }}" staging/* --repo "$GITHUB_REPOSITORY" --title "v${{ inputs.version }}" --latest
